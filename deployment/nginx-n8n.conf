# Nginx Configuration für n8n
# Domain: n8n.werdemeisterdeinergedankenagent.de
# Upstream: 127.0.0.1:5678 (n8n-Container, nur an localhost gebunden — siehe docker-compose.yml)
#
# Zweck: n8n ausschließlich über HTTPS erreichbar machen. Der Owner-Login (n8n
# User-Management ab v1.0) darf NICHT über HTTP im Klartext laufen.
#
# Einrichtung:
#   1. Diese Datei nach /etc/nginx/sites-available/n8n kopieren und verlinken:
#        ln -s /etc/nginx/sites-available/n8n /etc/nginx/sites-enabled/n8n
#   2. nginx -t && systemctl reload nginx
#   3. TLS-Zertifikat + HTTP->HTTPS-Redirect via Certbot ausrollen:
#        certbot --nginx -d n8n.werdemeisterdeinergedankenagent.de
#      Certbot fügt den 443-Server-Block, das Zertifikat und den Redirect
#      automatisch hinzu (analog nginx-reading-agent.conf).

server {
    listen 80;
    server_name n8n.werdemeisterdeinergedankenagent.de;

    # ACME Challenge für Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:5678;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket-Upgrade — n8n nutzt Push-Verbindungen im Editor (Pflicht,
        # sonst hängt die UI bzw. Ausführungs-Updates kommen nicht an).
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # n8n-Workflows/Binärdaten können groß sein
        client_max_body_size 32m;

        # Timeouts (lange laufende Executions / SSE)
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}

# HTTPS-Server-Block (443), Zertifikat und HTTP->HTTPS-Redirect werden von
# Certbot (--nginx) automatisch ergänzt. Nach dem certbot-Lauf zusätzlich HSTS
# im 443-Block setzen (2 Jahre, wie bei den .167-Domains):
#   add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
