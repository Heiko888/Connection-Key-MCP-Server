version: '3.8'

services:
  # n8n - Workflow Engine
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-change-me}
      - N8N_HOST=${N8N_HOST:-n8n.werdemeisterdeinergedankenagent.de}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-https}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL:-https://n8n.werdemeisterdeinergedankenagent.de}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      # Internal service URLs (Docker network)
      - BACKEND_URL=http://connection-key:3000
      - READING_WORKER_URL=http://reading-worker:4000
      # Telegram
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHANNEL_ID=${TELEGRAM_CHANNEL_ID}
      # Supabase (fĂĽr direkte DB-Abfragen in n8n)
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    networks:
      - app-network

  # MCP HTTP Gateway
  mcp-gateway:
    build:
      context: .
      dockerfile: Dockerfile.mcp-gateway
    container_name: mcp-gateway
    ports:
      - "7000:7000"
    environment:
      - NODE_ENV=production
      - MCP_PORT=7000
      - MCP_API_KEY=${CK_AGENT_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - CANVA_CLIENT_ID=${CANVA_CLIENT_ID:-}
      - CANVA_CLIENT_SECRET=${CANVA_CLIENT_SECRET:-}
      - CANVA_REDIRECT_URI=${CANVA_REDIRECT_URI:-}
      - CANVA_MCP_URL=${CANVA_MCP_URL:-https://mcp.canva.com/mcp}
      - FRONTEND_URL=${FRONTEND_URL:-https://coach.the-connection-key.de}
    restart: unless-stopped
    networks:
      - app-network

  # Connection-Key Server - Zentrale API
  connection-key:
    build:
      context: .
      dockerfile: Dockerfile.connection-key
    container_name: connection-key
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - READING_AGENT_URL=${READING_AGENT_URL:-http://reading-worker:4000}
      - N8N_BASE_URL=http://n8n:5678
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      - API_KEY=${API_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHANNEL_ID=${TELEGRAM_CHANNEL_ID}
      - MCP_SERVER_URL=http://mcp-gateway:7000
      - MATTERMOST_WEBHOOK_URL=${MATTERMOST_WEBHOOK_URL}
      - MATTERMOST_WEBHOOK_READINGS=${MATTERMOST_WEBHOOK_READINGS}
      - MATTERMOST_WEBHOOK_ERRORS=${MATTERMOST_WEBHOOK_ERRORS}
    depends_on:
      - n8n
      - redis
    restart: unless-stopped
    networks:
      - app-network

  # Reading Agent (vormals PM2 reading-agent)
  reading-worker:
    build:
      context: ./reading-worker
      dockerfile: Dockerfile
    container_name: reading-worker
    
    ports:
      - "4000:4000"   

    environment:
      - NODE_ENV=production
      - PORT=4000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - API_KEY=${API_KEY}

      # Supabase
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}

      # Redis (Docker DNS)
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}

      # Security
      - AGENT_SECRET=${AGENT_SECRET}

      # Chart API
      - HD_APP_URL=${HD_APP_URL:-https://www.the-connection-key.de}

      # Claude Timeout (300s fĂĽr lange Readings)
      - CLAUDE_TIMEOUT_MS=${CLAUDE_TIMEOUT_MS:-300000}

      # Telegram (fĂĽr VIP-DMs)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHANNEL_ID=${TELEGRAM_CHANNEL_ID}

      # Mattermost (Coach-Benachrichtigungen)
      - MATTERMOST_WEBHOOK_URL=${MATTERMOST_WEBHOOK_URL}
      - MATTERMOST_WEBHOOK_READINGS=${MATTERMOST_WEBHOOK_READINGS}
      - MATTERMOST_WEBHOOK_CHANNEL=${MATTERMOST_WEBHOOK_CHANNEL}
      - MATTERMOST_WEBHOOK_BUSINESS=${MATTERMOST_WEBHOOK_BUSINESS}
      - MATTERMOST_WEBHOOK_ERRORS=${MATTERMOST_WEBHOOK_ERRORS}

    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  # V4 Reading Worker (deaktiviert - Polling ist in reading-worker integriert)
  # v4-reading-worker: disabled

  # Frontend - Next.js (Dev)
  #frontend:
   # image: node:20-alpine
   # container_name: connection-key-frontend
   # working_dir: /app
   # volumes:
   #  - ./frontend:/app
   # command: sh -c "npm install && npx next dev -p 3005"
   # ports:
   #  - "3005:3005"
   # restart: unless-stopped
   # networks:
    #  - app-network

  # Sync Reading Service (synchrone Readings fĂĽr Chat)
  sync-reading-service:
    build:
      context: ./sync-reading-service
      dockerfile: Dockerfile
    container_name: sync-reading-service
    ports:
      - "7001:7001"
    environment:
      - NODE_ENV=production
      - PORT=7001
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    restart: unless-stopped
    networks:
      - app-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: redis-queue-secure
    volumes:
      - redis_data:/data
    command: sh -c "redis-server --requirepass \"$$REDIS_PASSWORD\" --bind 0.0.0.0 --protected-mode yes --appendonly yes"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$$REDIS_PASSWORD", "ping"]
      interval: 30s
      timeout: 3s
      retries: 5

volumes:
  n8n_data:
  redis_data:

networks:
  app-network:
    driver: bridge
