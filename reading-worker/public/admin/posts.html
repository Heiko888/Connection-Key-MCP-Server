<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Posts — The Connection Key</title>
<style>
  :root {
    --bg: #0a0806;
    --fg: #f5f1eb;
    --muted: #8a827a;
    --accent: #f29f05;
    --accent2: #8c1d04;
    --border: rgba(255,255,255,0.1);
    --card: rgba(255,255,255,0.04);
    --card-hover: rgba(255,255,255,0.08);
    --success: #4caf50;
    --warning: #ff9800;
  }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--fg); line-height: 1.5; }
  header { padding: 24px 32px; border-bottom: 1px solid var(--border); background: linear-gradient(180deg, rgba(242,159,5,0.05), transparent); }
  h1 { margin: 0 0 8px; font-size: 24px; font-weight: 600; }
  .sub { color: var(--muted); font-size: 14px; }
  main { padding: 24px 32px; max-width: 1600px; margin: 0 auto; }

  .controls { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .controls label { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  select, input[type=text], input[type=search] {
    background: var(--card); color: var(--fg); border: 1px solid var(--border);
    padding: 8px 12px; border-radius: 6px; font-size: 14px; font-family: inherit;
  }
  input[type=search] { min-width: 240px; }
  button {
    background: var(--card); color: var(--fg); border: 1px solid var(--border);
    padding: 8px 14px; border-radius: 6px; font-size: 13px; cursor: pointer;
    font-family: inherit; transition: background 0.1s;
  }
  button:hover { background: var(--card-hover); }
  button.primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); border-color: transparent; color: white; }
  button.primary:hover { filter: brightness(1.1); }
  .count { color: var(--muted); font-size: 13px; margin-left: auto; }

  .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); }
  .post {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 18px; display: flex; flex-direction: column; gap: 10px;
    transition: background 0.1s;
  }
  .post:hover { background: var(--card-hover); }
  .post-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .post-meta { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .post-topic { font-size: 15px; font-weight: 600; flex: 1; }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: rgba(255,255,255,0.06); color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .badge.type { background: rgba(242,159,5,0.15); color: var(--accent); }
  .badge.status-published { background: rgba(76,175,80,0.15); color: var(--success); }
  .badge.status-draft { background: rgba(255,152,0,0.15); color: var(--warning); }
  .badge.edited { background: rgba(140,29,4,0.3); color: #ff7a5a; }
  .badge.sent { background: rgba(76,175,80,0.15); color: var(--success); }

  .caption { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 6px; font-size: 13px; max-height: 140px; overflow: hidden; position: relative; }
  .caption.expanded { max-height: none; }
  .caption::after { content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 30px; background: linear-gradient(180deg, transparent, var(--card)); pointer-events: none; }
  .caption.expanded::after { display: none; }

  .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: auto; }
  .actions button { font-size: 12px; padding: 6px 10px; }

  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 100; }
  .modal-bg.open { display: flex; }
  .modal { background: #1a1714; border: 1px solid var(--border); border-radius: 12px; width: min(800px, 92vw); max-height: 92vh; display: flex; flex-direction: column; overflow: hidden; }
  .modal-head { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-head h2 { margin: 0; font-size: 16px; }
  .modal-body { padding: 20px 24px; overflow-y: auto; }
  .modal-body label { display: block; font-size: 12px; color: var(--muted); margin: 12px 0 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .modal-body textarea { width: 100%; background: rgba(0,0,0,0.3); color: var(--fg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-family: inherit; font-size: 13px; resize: vertical; min-height: 120px; line-height: 1.6; }
  .modal-foot { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--success); color: white; padding: 12px 20px; border-radius: 6px; font-size: 14px; opacity: 0; transform: translateY(10px); transition: all 0.2s; z-index: 200; }
  .toast.show { opacity: 1; transform: translateY(0); }

  .loading, .empty { text-align: center; padding: 40px; color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>Admin Posts — Instagram / Telegram Content</h1>
  <div class="sub">Verwaltung und Bearbeitung generierter Posts aus <code>channel_posts</code>. Instagram-Captions sind hier verfügbar zum Kopieren und Editieren bevor du sie manuell auf Instagram postest.</div>
</header>

<main>
  <div class="controls">
    <label>Zeitraum:
      <select id="range">
        <option value="today">Heute</option>
        <option value="7" selected>Letzte 7 Tage</option>
        <option value="30">Letzte 30 Tage</option>
        <option value="90">Letzte 90 Tage</option>
        <option value="all">Alle</option>
      </select>
    </label>
    <label>Typ:
      <select id="type">
        <option value="">alle</option>
        <option value="tagesimpuls">tagesimpuls</option>
        <option value="hd-wissen">hd-wissen</option>
        <option value="beziehung">beziehung</option>
        <option value="social-content">social-content</option>
        <option value="video-concept">video-concept</option>
      </select>
    </label>
    <label>Status:
      <select id="status">
        <option value="">alle</option>
        <option value="draft">draft</option>
        <option value="published">published</option>
        <option value="edited">editiert</option>
      </select>
    </label>
    <input id="search" type="search" placeholder="Volltext-Suche…" />
    <button id="reload">Neu laden</button>
    <span class="count" id="count"></span>
  </div>

  <div id="grid" class="grid"><div class="loading">Lade…</div></div>
</main>

<div id="modal" class="modal-bg">
  <div class="modal">
    <div class="modal-head">
      <h2 id="mTitle">Bearbeiten</h2>
      <button id="mClose">×</button>
    </div>
    <div class="modal-body">
      <label>Topic</label>
      <input id="mTopic" type="text" readonly style="width:100%;background:rgba(0,0,0,0.3);color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-family:inherit;">
      <label>Telegram Text</label>
      <textarea id="mTelegram" rows="6"></textarea>
      <label>Instagram Caption</label>
      <textarea id="mInstagram" rows="10"></textarea>
    </div>
    <div class="modal-foot">
      <button id="mCancel">Abbrechen</button>
      <button id="mSave" class="primary">Speichern</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const API = window.location.origin;
const els = {
  range: document.getElementById('range'),
  type: document.getElementById('type'),
  status: document.getElementById('status'),
  search: document.getElementById('search'),
  reload: document.getElementById('reload'),
  grid: document.getElementById('grid'),
  count: document.getElementById('count'),
  modal: document.getElementById('modal'),
  mTitle: document.getElementById('mTitle'),
  mTopic: document.getElementById('mTopic'),
  mTelegram: document.getElementById('mTelegram'),
  mInstagram: document.getElementById('mInstagram'),
  mClose: document.getElementById('mClose'),
  mCancel: document.getElementById('mCancel'),
  mSave: document.getElementById('mSave'),
  toast: document.getElementById('toast'),
};

let allPosts = [];
let current = null;

function toast(msg, ms = 2500) {
  els.toast.textContent = msg;
  els.toast.classList.add('show');
  setTimeout(() => els.toast.classList.remove('show'), ms);
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function load() {
  const range = els.range.value;
  const type = els.type.value;
  const search = els.search.value.trim();
  const qs = new URLSearchParams();
  if (range === 'today') {
    // today reduziert auf days=1
    qs.set('days', '1');
  } else if (range === 'all') {
    qs.set('days', '9999');
  } else {
    qs.set('days', range);
  }
  if (type) qs.set('type', type);
  if (search) qs.set('q', search);

  els.grid.innerHTML = '<div class="loading">Lade…</div>';
  try {
    const r = await fetch(`${API}/api/channel/content?${qs}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    allPosts = data.posts || [];
    render();
  } catch (e) {
    els.grid.innerHTML = `<div class="empty">Fehler: ${escapeHtml(e.message)}</div>`;
  }
}

function render() {
  const statusFilter = els.status.value;
  let posts = allPosts;
  if (statusFilter === 'edited') posts = posts.filter(p => p.edited);
  else if (statusFilter) posts = posts.filter(p => p.status === statusFilter);

  els.count.textContent = `${posts.length} Post${posts.length === 1 ? '' : 's'}`;

  if (posts.length === 0) {
    els.grid.innerHTML = '<div class="empty">Keine Posts gefunden.</div>';
    return;
  }

  els.grid.innerHTML = posts.map(p => {
    const d = p.date || p.created_at?.substring(0, 10) || '—';
    const caption = p.instagram_caption || p.telegram_text || '(kein Text)';
    const badges = [];
    if (p.type) badges.push(`<span class="badge type">${escapeHtml(p.type)}</span>`);
    if (p.status) badges.push(`<span class="badge status-${escapeHtml(p.status)}">${escapeHtml(p.status)}</span>`);
    if (p.edited) badges.push(`<span class="badge edited">editiert</span>`);
    if (p.telegram_sent) badges.push(`<span class="badge sent">📤 Telegram</span>`);
    return `
      <div class="post" data-id="${p.id}">
        <div class="post-head">
          <div>
            <div class="post-meta">${d}</div>
            <div class="post-topic">${escapeHtml(p.topic || '—')}</div>
          </div>
        </div>
        <div class="badges">${badges.join('')}</div>
        <div class="caption" onclick="this.classList.toggle('expanded')">${escapeHtml(caption)}</div>
        <div class="actions">
          <button onclick="edit('${p.id}')">✏️ Edit</button>
          <button onclick="copyIG('${p.id}')">📋 IG-Caption</button>
          <button onclick="copyTG('${p.id}')">📋 TG-Text</button>
        </div>
      </div>
    `;
  }).join('');
}

function edit(id) {
  const p = allPosts.find(x => x.id === id);
  if (!p) return;
  current = p;
  els.mTitle.textContent = p.topic || 'Post bearbeiten';
  els.mTopic.value = `${p.date || ''} · ${p.type || ''} · ${p.id}`;
  els.mTelegram.value = p.telegram_text || '';
  els.mInstagram.value = p.instagram_caption || '';
  els.modal.classList.add('open');
}

function closeModal() {
  els.modal.classList.remove('open');
  current = null;
}

async function save() {
  if (!current) return;
  const body = {
    telegram_text: els.mTelegram.value,
    instagram_caption: els.mInstagram.value,
  };
  try {
    const r = await fetch(`${API}/api/channel/content/${current.id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    const idx = allPosts.findIndex(p => p.id === current.id);
    if (idx >= 0) allPosts[idx] = data.post || allPosts[idx];
    closeModal();
    render();
    toast('Gespeichert ✓');
  } catch (e) {
    toast(`Fehler: ${e.message}`, 4000);
  }
}

function copyIG(id) {
  const p = allPosts.find(x => x.id === id);
  if (!p?.instagram_caption) return toast('Keine Instagram-Caption');
  navigator.clipboard.writeText(p.instagram_caption).then(() => toast('Instagram-Caption kopiert ✓'));
}
function copyTG(id) {
  const p = allPosts.find(x => x.id === id);
  if (!p?.telegram_text) return toast('Kein Telegram-Text');
  navigator.clipboard.writeText(p.telegram_text).then(() => toast('Telegram-Text kopiert ✓'));
}

// Events
els.reload.onclick = load;
els.range.onchange = load;
els.type.onchange = load;
els.search.onchange = load;
els.status.onchange = render;
els.mClose.onclick = closeModal;
els.mCancel.onclick = closeModal;
els.mSave.onclick = save;
els.modal.onclick = (e) => { if (e.target === els.modal) closeModal(); };
window.addEventListener('keydown', (e) => { if (e.key === 'Escape' && els.modal.classList.contains('open')) closeModal(); });

// Globale Handler für inline onclick
window.edit = edit;
window.copyIG = copyIG;
window.copyTG = copyTG;

// Initial
load();
</script>
</body>
</html>
